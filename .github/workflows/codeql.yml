# P4-6 (S-AUDIT-001): frontend SAST. backend 는 codeql.yml(java-kotlin) 보유, frontend 는 부재였음 →
# JavaScript/TypeScript CodeQL 추가 (Nuxt/Vue/TS). build-mode: none (JS/TS 는 소스 추출, 빌드 불요).

name: CodeQL Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 매주 월요일 03:00 KST (UTC 18:00 일요일) — full scan
    - cron: '0 18 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript'] # frontend = Nuxt/Vue/TS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # JS/TS 는 빌드 없이 소스 추출 (bun install 불요).
          build-mode: none
          # backend codeql.yml 와 동일 query suite — CRITICAL + HIGH + MEDIUM.
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

      # 결과는 GitHub Security 탭. Critical 발견 시 PR block.
