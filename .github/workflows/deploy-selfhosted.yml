name: Deploy (self-hosted Mac)

# 맥 self-hosted 러너에서 로컬 재빌드 + 재배포 (Cloudflare Tunnel 호스팅).
# push(main) 전용 — fork PR 에서는 절대 실행 안 함(self-hosted 보안).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-selfhosted
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, terraworld]
    steps:
      - name: Rebuild image, redeploy frontend
        run: |
          set -euo pipefail
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/opt/homebrew/bin"
          FE=/Users/jaeseok/TerraWorld-IT/frontend
          DEPLOY=/Users/jaeseok/TerraWorld-IT/deploy

          cd "$FE"
          git fetch origin
          git reset --hard origin/main
          git submodule update --init --recursive

          docker build -t ghcr.io/terraworld-it/terraworld-frontend:latest .

          cd "$DEPLOY"
          docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d --no-deps frontend

          echo "frontend 응답 대기..."
          # 실제 근본 원인(2026-07-08): 100초/180초/600초 세 예산 모두 "정확히 그 예산만큼"
          # 걸린 뒤 실패 — 콜드스타트가 느린 게 아니라 애초에 성공 조건을 영원히 못 만나고
          # 있었다. `/`는 app/middleware/auth.ts 의 protect-by-default 라우트 가드 대상이라
          # 미인증 요청은 항상 /auth/login 으로 302 리다이렉트되는데, 이 스크립트는 정확히
          # 200 만 성공으로 인정해서 매번 예산을 다 쓰고 실패해왔다(직접 확인:
          # curl https://terraworld.web-qplay.kr/ → 302, /auth/login → 200). 배포 자체는
          # 매번 정상 진행됐고(프로덕션 번들에서 새 커밋 코드 확인됨), 이 헬스체크 스크립트만
          # 잘못된 경로를 확인해 거짓 실패를 보고해온 것. 인증 없이 항상 200 이 보장되는
          # /auth/login 으로 체크 대상 변경 — 이제 정상 기동 시 몇 초 내 통과해야 하므로
          # 예산(150회×4초=600초)은 안전 마진으로만 유지.
          for i in $(seq 1 150); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:13000/auth/login || echo 000)
            [ "$code" = 200 ] && { echo "✅ frontend 200"; exit 0; }
            sleep 4
          done
          echo "❌ frontend 미응답"; docker logs --tail 50 tw-frontend; exit 1
