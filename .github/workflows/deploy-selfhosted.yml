name: Deploy (self-hosted Mac)

# 맥 self-hosted 러너에서 로컬 재빌드 + 재배포 (Cloudflare Tunnel 호스팅).
# push(main) 전용 — fork PR 에서는 절대 실행 안 함(self-hosted 보안).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-selfhosted
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, terraworld]
    steps:
      - name: Rebuild image, redeploy frontend
        run: |
          set -euo pipefail
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/opt/homebrew/bin"
          FE=/Users/jaeseok/TerraWorld-IT/frontend
          DEPLOY=/Users/jaeseok/TerraWorld-IT/deploy

          cd "$FE"
          git fetch origin
          git reset --hard origin/main
          git submodule update --init --recursive

          docker build -t ghcr.io/terraworld-it/terraworld-frontend:latest .

          cd "$DEPLOY"
          docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d --no-deps frontend

          echo "frontend 응답 대기..."
          # 실측(2026-07-08): 컨테이너 재생성 후 콜드스타트 시간의 편차가 커서(101초 →
          # 184초, 같은 머신에서 두 번 연속 측정해도 82% 차이) 고정 예산으로는 안정적으로
          # 못 잡는다. 100초 예산(run 28961083113)과 180초 예산(run 28963064484) 둘 다
          # "헬스체크가 포기한 직후 컨테이너가 Listening on 로그를 찍는" 동일 패턴으로 실패 —
          # 실제로는 배포 자체(docker compose up)는 이미 성공해 새 코드가 라이브 서빙되고
          # 있었음(실측: 배포 "실패" 처리된 직후 프로덕션 번들에서 새 커밋의 코드 확인됨).
          # 즉 이 스크립트는 배포 성공/실패를 정확히 반영하지 못하는 상태였다 — 실제 배포는
          # 되는데 CI만 매번 거짓 실패를 보고해온 것. 콜드스타트 편차에 확실히 여유를 두기
          # 위해 예산을 150회×4초=600초(10분)로 크게 확대.
          for i in $(seq 1 150); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:13000/ || echo 000)
            [ "$code" = 200 ] && { echo "✅ frontend 200"; exit 0; }
            sleep 4
          done
          echo "❌ frontend 미응답"; docker logs --tail 50 tw-frontend; exit 1
