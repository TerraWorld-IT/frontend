name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Lint — fast gate (oxlint ~1s)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run lint:check

  # ─────────────────────────────────────────────────────────────────
  # 2. Typecheck — vue-tsc strict mode
  # ─────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (vue-tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      # L-CI-STRICT-001 (UltraPlan v3): continue-on-error 제거. hey-api union type debt 는
      # castData<T> utility (useOpenApi.ts:43) 로 해소 — 2026-05-18 cycle 검증 시 PASS.
      - run: bun run typecheck

  # ─────────────────────────────────────────────────────────────────
  # 3. Unit tests — Vitest + coverage
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Test summary
        if: always()
        run: echo "✅ Tests completed"

  # ─────────────────────────────────────────────────────────────────
  # 4. Build — Nuxt production build + artifact size check
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build (nuxt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NUXT_PUBLIC_API_BASE_URL: https://api.terraworld.app/api/v1

      # UltraPlan C-BASELINE-CYCLE-001: bundle baseline diff (warn +10KB/+20%, fail +50KB/+50%).
      # `bundle-baseline.json` 은 i18n revert 직후 lock 된 측정 기준. baseline 벗어남 = 의도된 추가 또는 회귀.
      - name: Bundle baseline diff
        run: node scripts/measure-bundle.mjs --compare bundle-baseline.json
        continue-on-error: true  # advisory phase — strict phase 진입 시 제거

      - name: Check build output size
        run: |
          SIZE=$(du -sh .output/ | cut -f1)
          echo "📦 Build output size: $SIZE"
          # Fail if build exceeds 100MB (likely misconfiguration)
          SIZE_KB=$(du -sk .output/ | cut -f1)
          if [ "$SIZE_KB" -gt 102400 ]; then
            echo "::error::Build output exceeds 100MB ($SIZE). Check for bundled node_modules or large assets."
            exit 1
          fi

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: .output/
          retention-days: 7
