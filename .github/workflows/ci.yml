name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

# 낙서장 리팩토링 트랙CI(req 5): 4-job(lint/typecheck/test/build 각각 checkout+setup+install ×4)을
# 단일 job 으로 compact — backend ci.yml 패턴 정합, bun install 1회. trade-off: 병렬 job 피드백 대신
# 순차(lint→typecheck→test→build) 이나 runner 분·중복 install 제거 + 운영 단계 축소.
jobs:
  ci:
    name: CI (lint → typecheck → test → build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # 1. Lint (oxlint ~1s) — fast gate
      - name: Lint (oxlint)
        run: bun run lint:check

      # 2. Typecheck (vue-tsc strict) — L-CI-STRICT-001: continue-on-error 없음
      - name: Typecheck (vue-tsc)
        run: bun run typecheck

      # 3. Unit tests (vitest + coverage)
      - name: Test (vitest)
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      # 4. Build (Nuxt) + bundle baseline + size guard
      - name: Build
        run: bun run build
        env:
          NUXT_PUBLIC_API_BASE_URL: https://api.terraworld.app/api/v1

      - name: Bundle baseline diff
        run: node scripts/measure-bundle.mjs --compare bundle-baseline.json
        continue-on-error: true # advisory phase

      - name: Check build output size
        run: |
          SIZE=$(du -sh .output/ | cut -f1)
          echo "📦 Build output size: $SIZE"
          SIZE_KB=$(du -sk .output/ | cut -f1)
          if [ "$SIZE_KB" -gt 102400 ]; then
            echo "::error::Build output exceeds 100MB ($SIZE). Check for bundled node_modules or large assets."
            exit 1
          fi
