name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Lint — fast gate (oxlint ~1s)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run lint:check

  # ─────────────────────────────────────────────────────────────────
  # 2. Typecheck — vue-tsc strict mode
  # ─────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (vue-tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      # TODO: Remove continue-on-error after hey-api union type debt is resolved
      # Tracked: hey-api TData[keyof TData] unwrapping causes ~50 false positives
      # Target: remove by 2026-06-01
      - run: bun run typecheck
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # 3. Unit tests — Vitest + coverage
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Test summary
        if: always()
        run: echo "✅ Tests completed"

  # ─────────────────────────────────────────────────────────────────
  # 4. Build — Nuxt production build + artifact size check
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build (nuxt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NUXT_PUBLIC_API_BASE_URL: https://api.terraworld.app/api/v1

      - name: Check build output size
        run: |
          SIZE=$(du -sh .output/ | cut -f1)
          echo "📦 Build output size: $SIZE"
          # Fail if build exceeds 100MB (likely misconfiguration)
          SIZE_KB=$(du -sk .output/ | cut -f1)
          if [ "$SIZE_KB" -gt 102400 ]; then
            echo "::error::Build output exceeds 100MB ($SIZE). Check for bundled node_modules or large assets."
            exit 1
          fi

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: .output/
          retention-days: 7
