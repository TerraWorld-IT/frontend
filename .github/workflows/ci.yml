name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  # 수동 재배포 경로 (구 deploy-selfhosted.yml 의 workflow_dispatch 대체) —
  # main 에서 dispatch 하면 CI 통과 후 build-push → deploy 까지 이어진다.
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  # main 은 cancel 금지 — 배포 job(컨테이너 교체) 이 중간에 죽으면 안 됨. 연속 push 는 큐잉.
  # PR/develop 은 기존대로 구식 커밋 빌드 취소.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE: ghcr.io/terraworld-it/terraworld-frontend

# 낙서장 리팩토링 트랙CI(req 5): 4-job(lint/typecheck/test/build 각각 checkout+setup+install ×4)을
# 단일 job 으로 compact — backend ci.yml 패턴 정합, bun install 1회. trade-off: 병렬 job 피드백 대신
# 순차(lint→typecheck→test→build) 이나 runner 분·중복 install 제거 + 운영 단계 축소.
jobs:
  ci:
    name: CI (lint → typecheck → test → build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          # openapi pr.yml 과 동일 핀 — latest 는 bun 신버전 회귀 시 재현 불가 실패 유발
          bun-version: "1.3.14"

      # bun install 캐시 — bun.lock 해시 키 (miss 시 풀 다운로드만, restore-keys 로 부분 재사용)
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # 1. Lint (oxlint ~1s) — fast gate
      - name: Lint (oxlint)
        run: bun run lint:check

      # 2. Typecheck (vue-tsc strict) — L-CI-STRICT-001: continue-on-error 없음
      - name: Typecheck (vue-tsc)
        run: bun run typecheck

      # 3. Unit tests (vitest + coverage)
      - name: Test (vitest)
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      # 4. Build (Nuxt) + bundle baseline + size guard
      - name: Build
        run: bun run build
        env:
          NUXT_PUBLIC_API_BASE_URL: https://api.terraworld.app/api/v1

      - name: Bundle baseline diff
        run: node scripts/measure-bundle.mjs --compare bundle-baseline.json
        continue-on-error: true # advisory phase

      - name: Check build output size
        run: |
          SIZE=$(du -sh .output/ | cut -f1)
          echo "📦 Build output size: $SIZE"
          SIZE_KB=$(du -sk .output/ | cut -f1)
          if [ "$SIZE_KB" -gt 102400 ]; then
            echo "::error::Build output exceeds 100MB ($SIZE). Check for bundled node_modules or large assets."
            exit 1
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # 배포 (구 deploy-selfhosted.yml 통합, 2026-07-15)
  #
  # 왜 CI 와 같은 워크플로인가: 별도 push-트리거 워크플로는 CI 와 병렬 시작되어
  # 테스트가 깨진 커밋도 프로덕션에 직행했다. `needs: ci` 다운스트림 job 은
  # 같은 run = 같은 SHA 라 workflow_run 방식의 head_sha 정합 함정이 없다.
  #
  # 이미지는 GitHub-hosted ubuntu 러너에서 빌드해 ghcr 로 push 하고,
  # 맥 self-hosted 러너는 그것을 pull 해서 컨테이너만 교체한다 (Cloudflare Tunnel 호스팅).
  #
  # 왜 맥에서 빌드하지 않는가: 맥 러너의 Docker VM 메모리 한도 안에서 Nitro 빌드가 커널에
  # SIGKILL 당해(`cannot allocate memory`) 배포가 연속 실패했다. NODE_OPTIONS 의 heap 상한은
  # in-process heap 만 줄일 뿐 외부 OOM 을 막지 못한다.
  #
  # 왜 맥 호스트에서 빌드해 산출물만 이미지에 넣지 않는가: `.output/server/node_modules` 에
  # `@img/sharp-*`, `@esbuild/*`, oxc 바인딩 등 플랫폼 종속 네이티브 패키지가 포함되므로
  # darwin-arm64 산출물을 linux 이미지에 넣으면 런타임에 깨진다. 빌드 OS = 배포 OS 여야 한다.
  # (CI job 의 .output 재사용도 동일 이유로 불가 — CI=ubuntu glibc, 이미지=alpine musl.)
  #
  # 맥은 공인 IP/SSH 가 없어 클라우드에서 배포를 밀어넣을 수 없다. 그래서 맥이 직접 pull 한다.
  # push(main) 전용 — fork PR 에서는 절대 실행 안 함(self-hosted 보안).
  # ───────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build image (ubuntu) → ghcr
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      # openapi-frontend 는 별도 private repo 라 GITHUB_TOKEN 으로는 서브모듈 fetch 불가.
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # layer 캐시 (type=gha): ephemeral 러너에서도 의존성 미변경 push 는
      # bun install 레이어를 재사용 — 매 배포 콜드 빌드 제거.
      # :latest 는 compose 가 참조하는 태그, :<sha> 는 롤백용.
      #
      # provenance: false — buildx 기본값은 attestation 을 포함한 OCI 이미지 인덱스를
      # push 하는데, Apple Silicon 맥의 docker 가 인덱스에서 arm64 를 찾다 실패한다
      # ("no matching manifest for linux/arm64/v8", 2026-07-15 실측). 구 파이프라인의
      # plain docker build 와 같은 단일-manifest amd64 로 유지 — 맥은 기존처럼
      # Rosetta 에뮬레이션으로 실행한다 (프로덕션 기존 동작과 동일).
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull and restart (self-hosted Mac)
    needs: build-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, terraworld]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - name: Pull image and restart frontend
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/opt/homebrew/bin"
          DEPLOY=/Users/jaeseok/TerraWorld-IT/deploy

          # ghcr 패키지는 private 이라 pull 에 자격증명이 필요한데, `docker login` 은 쓸 수 없다.
          # 맥의 docker 자격증명 저장소는 osxkeychain 이고 비대화형 러너 세션에서는 키체인이 잠겨
          # 있어 저장 단계가 `User interaction is not allowed. (-25308)` 로 실패한다. config 를
          # 비워도 소용없다 — docker CLI 는 config 에 auth 항목이 하나도 없으면 플랫폼 기본 helper
          # 를 자동 감지해 붙인다. 그래서 로그인 대신 auth 를 config 에 직접 써 넣는다.
          # 저장 단계가 아예 일어나지 않으므로 키체인을 건드리지 않는다.
          #
          # 이 config 는 이 실행 전용 임시 디렉터리에만 있고 실행 후 지워진다.
          # 운영자의 ~/.docker/config.json 은 그대로 둔다.
          TMPCFG="$(mktemp -d)"
          trap 'rm -rf "$TMPCFG"' EXIT
          # compose 는 docker CLI 플러그인이라 $DOCKER_CONFIG/cli-plugins 에서 먼저 찾는다.
          if [ -d "$HOME/.docker/cli-plugins" ]; then
            ln -s "$HOME/.docker/cli-plugins" "$TMPCFG/cli-plugins"
          fi
          # 토큰은 파이프로만 흐른다(argv/프로세스 목록 미노출). 파일은 소유자만 읽는다.
          GHCR_AUTH="$(printf '%s:%s' "$GHCR_USER" "$GHCR_TOKEN" | base64 | tr -d '\n')"
          umask 077
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$GHCR_AUTH" > "$TMPCFG/config.json"
          unset GHCR_AUTH
          export DOCKER_CONFIG="$TMPCFG"
          docker compose version >/dev/null || { echo "❌ docker compose 플러그인을 찾지 못함"; exit 1; }

          cd "$DEPLOY"
          # 런타임 공개 설정 보정 (멱등): Meta 앱 ID — 인스타 스토리 직공유의 source_application.
          # 비밀값 아님(클라이언트에 노출되는 공개 App ID)이라 워크플로에 평문으로 둔다.
          # 이미 항목이 있으면 건드리지 않는다 — 호스트 .env 의 수동 변경을 존중.
          grep -q '^NUXT_PUBLIC_META_APP_ID=' .env || echo 'NUXT_PUBLIC_META_APP_ID=1768257850852519' >> .env
          # compose 의 frontend 이미지는 ${REGISTRY_URL}/terraworld-frontend:${TAG:-latest}
          # = ghcr.io/terraworld-it/terraworld-frontend:latest (위 build-push 가 올린 그것).
          docker compose -f docker-compose.yml -f docker-compose.tunnel.yml pull frontend
          docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d --no-deps frontend

          echo "frontend 응답 대기..."
          # `/` 는 app/middleware/auth.ts 의 protect-by-default 가드 대상이라 미인증 요청이 항상
          # /auth/login 으로 302 된다. 인증 없이 200 이 보장되는 /auth/login 으로 확인한다.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:13000/auth/login || echo 000)
            [ "$code" = 200 ] && { echo "✅ frontend 200"; exit 0; }
            sleep 4
          done
          echo "❌ frontend 미응답"; docker logs --tail 50 tw-frontend; exit 1
