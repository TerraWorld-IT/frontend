name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          # `@terraworld-it/openapi-frontend` is a git submodule that holds the
          # generated TS SDK regenerated by TerraWorld-IT/openapi sync.yml.
          # Checking it out requires a PAT with read access to the private repo.
          submodules: recursive
          token: ${{ secrets.OPENAPI_FRONTEND_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint:check

      # NOTE: `bun run typecheck` currently fails on pre-existing type debt
      # (strict null checks in pages/, any-typed useApi body, etc.). Re-enable
      # once those are triaged — tracked separately, not a CI regression.

      - name: Build (nuxt)
        run: bun run build
        env:
          NUXT_PUBLIC_API_BASE_URL: https://api.terraworld.app/api/v1

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: .output/
          retention-days: 7
